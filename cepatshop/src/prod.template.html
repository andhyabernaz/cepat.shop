<!DOCTYPE html>
<html lang="id">

<head>
   <meta charset="utf-8">
   <meta name="format-detection" content="telephone=no">
   <meta name="msapplication-tap-highlight" content="no">
   <meta name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">
   <meta name="theme-color" content="#0d9e4f">

   <!-- DNS Prefetch & Preconnect -->
   <link rel="dns-prefetch" href="https://fonts.googleapis.com">
   <link rel="dns-prefetch" href="https://fonts.gstatic.com">
   <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

   <!-- Optimized Font Loading -->
   <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
   <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

   <!-- Favicon - only essential sizes -->
   <link rel="icon" type="image/png" sizes="32x32" href="icon/icon-32x32.png">
   <link rel="icon" type="image/png" sizes="16x16" href="icon/icon-16x16.png">

   <%= meta_head %>
   <%= json_schema %>
   <%= meta_seo %>

   <!-- Critical CSS Inline -->
   <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;background-color:#f8fafc}
      #q-app{min-height:100vh}
      .q-loading-bar{display:none}
   </style>
</head>

<body class="bg-grey-4">
   <%= meta_body %>
      <!-- DO NOT touch the following DIV -->
      <div id="q-app"></div>
</body>

</html>
